  <style>
    :root{
      --bg: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --track: #e5e7eb;
      --track-2: #f3f4f6;
      --fill: #f97316;
      --fill-2: #ea580c;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
    }
    .wrap{
      width: min(980px, 100%);
      text-align: center;
    }
    .badge{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 9999px;
      background: rgba(249, 115, 22, 0.10);
      border: 1px solid rgba(249, 115, 22, 0.25);
      margin-bottom: 14px;
      color: rgba(15, 23, 42, 0.85);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge svg{ width: 18px; height: 18px; }
    h1{
      margin: 0 0 10px;
      font-size: clamp(18px, 2.4vw, 22px);
      line-height: 1.25;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .sub{
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
    }
    .bar{
      position: relative;
      width: 100%;
      height: 34px;
      border-radius: 9999px;
      background: linear-gradient(180deg, var(--track-2) 0%, var(--track) 100%);
      border: 1px solid rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }
    .bar__fill{
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, var(--fill) 0%, var(--fill-2) 100%);
      border-radius: 9999px;
      transition: width 40ms linear;
    }
    .bar__label{
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      place-items: center;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      pointer-events: none;
      user-select: none;
      font-weight: 700;
    }
    @media (prefers-reduced-motion: reduce) {
      .bar__fill{ transition: none; }
    }
  </style>

      Conectando no WhatsApp

    <h1>Estamos redirecionando para um grupo com vagas</h1>
    <p class="sub">Isso leva cerca de <strong>3 segundos</strong>. Se não abrir automaticamente, volte e tente novamente.</p>

    <div class="bar" role="progressbar" aria-label="Progresso do redirecionamento" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="bar__fill" id="progress-fill"></div>
      <div class="bar__label">Procurando...</div>
    </div>
  </main>

  <script>
    (function () {
      var DURATION_MS = 3000;
      var fill = document.getElementById('progress-fill');
      var bar = document.querySelector('.bar[role="progressbar"]');
      var start = performance.now();

      function tick(now) {
        var t = Math.min((now - start) / DURATION_MS, 1);
        var pct = Math.round(t * 100);
        if (fill) fill.style.width = pct + '%';
        if (bar) bar.setAttribute('aria-valuenow', String(pct));
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
